name: CI

on: [pull_request, push]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        node: ['22.9.0', 24, 26]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: aikdna/kdna
          ref: 1e77e3e0d486c330fe9f9262b514ef24c859d469
          path: .cross-repo/kdna
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: ${{ matrix.node }}
      - name: Install through the integrity-pinned isolated npm release
        run: node scripts/trusted-npm.js ci --ignore-scripts --registry=https://registry.npmjs.org/ --@aikdna:registry=https://registry.npmjs.org/
      - run: node scripts/trusted-npm.js test
      - name: Reproduce and exercise the exact Core candidate artifact
        run: node scripts/trusted-npm.js run test:core-candidate-tar
        env:
          KDNA_CORE_CANDIDATE_SOURCE: ${{ github.workspace }}/.cross-repo/kdna
